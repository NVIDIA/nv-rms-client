syntax = "proto3";

package rack_manager;

// ScaleUpFabricLocation identifies the physical location of a member in the domain.
message ScaleUpFabricLocation {
  string chassis_id = 1;
  string slot_id = 2;
  string host_id = 3;
  string tray_index = 4;
}

// ScaleUpFabricComputeNode represents a compute node in a partition.
message ScaleUpFabricComputeNode {
  ScaleUpFabricLocation location = 1;
  int32 num_gpus = 2;
}

// ScaleUpFabricSwitch represents a switch in a partition.
message ScaleUpFabricSwitch {
  ScaleUpFabricLocation location = 1;
  int32 switch_id = 2;
  string switch_uid = 3;
  int32 num_ports = 4;
  string health = 5;
}

// ScaleUpFabricLinkEndpoint identifies one side of a connectivity record.
message ScaleUpFabricLinkEndpoint {
  ScaleUpFabricLocation location = 1;
  string switch_uid = 2;
  int32 port_num = 3;
}

// ScaleUpFabricLink represents a trunk or access link within a partition.
message ScaleUpFabricLink {
  ScaleUpFabricLinkEndpoint endpoint_1 = 1;
  ScaleUpFabricLinkEndpoint endpoint_2 = 2;
  string health = 3;
  string state = 4;
}

// ScaleUpFabricPartition represents one logical partition and its members.
message ScaleUpFabricPartition {
  int32 partition_id = 1;
  string name = 2;
  string health = 3;
  repeated ScaleUpFabricComputeNode compute_nodes = 4;
  repeated ScaleUpFabricSwitch switches = 5;
  repeated ScaleUpFabricLink trunk_links = 6;
  repeated ScaleUpFabricLink access_links = 7;
}

// ScaleUpFabricDomainInfo is the cluster-scoped domain snapshot returned by RMS.
message ScaleUpFabricDomainInfo {
  string domain_uuid = 1;
  string app_version = 2;
  repeated ScaleUpFabricPartition partitions = 3;
}
